<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body id="album-reader">
    
    <div class="contenedor-album">
        <img src="" alt="" id="caratula-album-reader" style="display: none;">
        <h1 id="titulo-album">Caggando</h1>
        <h2 id="artista-album">Lo hizo tu puta madre</h2>
        <div class="playlistContents" id="lista">
            <span>Nothing here yet</span>
        </div>
    </div>

    <script>
        const idDisco = window.location.search.split('id=')[1]?.split('&')[0];

        const titulo = document.getElementById('titulo-album');
        const artistaTxt = document.getElementById('artista-album');
        const cover = document.getElementById('caratula-album-reader');
        const lista = document.getElementById('lista');

        if(!idDisco){
            window.location.href = 'index.html';
        }

        Promise.all([
            fetch(`https://cdn.jsdelivr.net/gh/quicknheavy/almacen-musica1@main/discos.json?v=${Date.now()}`).then(res => res.json()),
            fetch(`https://cdn.jsdelivr.net/gh/quicknheavy/almacen-musica1@main/canciones.json?v=${Date.now()}`).then(res => res.json())
        ])
        .then(([baseDatosDiscos, baseDatosCanciones]) => {
            const infoDelDisco = baseDatosDiscos.find(disco => disco.id === idDisco);

            if (infoDelDisco){
                titulo.innerHTML = infoDelDisco.titulo;
                artistaTxt.innerHTML = `<a href="artista.html?artista=${encodeURIComponent(infoDelDisco.artista)}" style="text-decoration: none; color: #fff;">${infoDelDisco.artista}</a>`;
                cover.src = infoDelDisco.img;
                cover.style.display = "block";
            } else {
                titulo.innerHTML = "DISCHO NON ENKONTRAU";
            }

            const cancionesDelAlbum = baseDatosCanciones[idDisco];

            if(cancionesDelAlbum && cancionesDelAlbum.length > 0){
                lista.innerHTML = "";
                cancionesDelAlbum.forEach((cancion, i) => {
                    const itemLista = document.createElement('span');
                    itemLista.className = "playableSong";
                    itemLista.style.cursor = "pointer";

                    itemLista.onclick = () => {
                        window.parent.cargarPlaylist(cancionesDelAlbum, i, infoDelDisco.repo);
                    };
                    
                    itemLista.innerHTML = `${cancion.titulo}`;
                    lista.appendChild(itemLista);
                });
            } else {
                const aviso = document.createElement('span');
                aviso.innerHTML = "El disco no incluye ninguna cancion o esta roto";
                lista.innerHTML = "";
                lista.appendChild(aviso);
            }
        });
    </script>
</body>
</html>
