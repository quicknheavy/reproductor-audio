        const contenedor = document.getElementById('contenedor-discos');

        function mostrarDiscos(lista){
            contenedor.innerHTML = "";

            if (lista.length === 0){
                contenedor.innerHTML = "<p>No se encuentra</p>";
                return;
            }

            lista.forEach(disco => {
                const tarjeta = document.createElement('span');
                tarjeta.className = 'album-card';
                tarjeta.style.cursor = "pointer";
                tarjeta.innerHTML = `<img src="${disco.img}" class="coverImg" />${disco.titulo} - ${disco.artista}`
                tarjeta.onclick = () => {
                    window.location.href = disco.url;
                }
                contenedor.appendChild(tarjeta);
            })
        }

        function filtrarDiscos(){
            const textoUsuario = document.getElementById('buscador').value.toLowerCase();
            const discosFiltrados = misDiscos.filter(disco => {
                return disco.titulo.toLowerCase().includes(textoUsuario) || disco.artista.toLowerCase().includes(textoUsuario);
            });

            mostrarDiscos(discosFiltrados);
        }

        mostrarDiscos(misDiscos);
