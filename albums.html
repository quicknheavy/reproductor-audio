<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Spoti</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="busqueda">
        <input class="busqueda" type="text" id="buscador" onkeyup="filtrarDiscos()" placeholder="Buscar...">
    </div>
    <div id="contenedor-discos">

    </div>

    <script>
        let misDiscos = [];
        const contenedor = document.getElementById('contenedor-discos');

        fetch('https://cdn.jsdelivr.net/gh/quicknheavy/music-database@main/discos.json')
        //fetch('discos.json')
            .then(respuesta => respuesta.json())
            .then(datos => {
                misDiscos = datos;
                mostrarDiscos(misDiscos);
            });

        function mostrarDiscos(lista){
            contenedor.innerHTML = "";

            if (lista.length === 0){
                contenedor.innerHTML = "<p>No se encuentra</p>";
                return;
            }

            lista.forEach(disco => {
                const maxCaracteresTitulo = 23;
                const maxCaracteresArtista = 20;
                let tituloDisco = disco.titulo;
                let artistaDisco = disco.artista;
                if (tituloDisco.length > maxCaracteresTitulo){
                    tituloDisco = tituloDisco.substring(0, maxCaracteresTitulo - 3) + "...";
                }
                if (artistaDisco.length > maxCaracteresArtista){
                    artistaDisco = artistaDisco.substring(0, maxCaracteresArtista - 3) + "...";
                }
                const tarjeta = document.createElement('span');
                tarjeta.className = 'album-card';
                tarjeta.style.cursor = "pointer";
                tarjeta.innerHTML = `<img src="${disco.img}" class="coverImg" />${tituloDisco} - ${artistaDisco}`;
                tarjeta.onclick = () => {
                    window.location.href = `album-reader.html?id=${disco.id}`;
                }
                contenedor.appendChild(tarjeta);
            })
        }

        function filtrarDiscos(){
            const textoUsuario = document.getElementById('buscador').value.toLowerCase();
            const discosFiltrados = misDiscos.filter(disco => {
                return disco.titulo.toLowerCase().includes(textoUsuario) || disco.artista.toLowerCase().includes(textoUsuario);
            });

            mostrarDiscos(discosFiltrados);
        }
    </script>
</body>
</html>
